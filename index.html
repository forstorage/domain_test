<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Web Page</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f4f4f4;
      color: #333;
      transition: 0.3s;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    main {
      padding: 2rem;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }

    .primary {
      background-color: #4CAF50;
      color: white;
    }

    .toggle {
      background-color: #333;
      color: white;
    }

    footer {
      margin-top: 2rem;
      padding: 1rem;
      background: #ddd;
      text-align: center;
    }

    /* Dark Mode */
    .dark {
      background-color: #121212;
      color: #f4f4f4;
    }

    .dark header {
      background: #222;
    }

    .dark footer {
      background: #222;
    }
  </style>
</head>
<body>

  <header>
    <h1>My First Web Page</h1>
  </header>

  <main>
    <h2 id="message">Welcome!</h2>
    <p>This is a simple interactive web page using HTML, CSS, and JavaScript.</p>

    <button class="primary" onclick="changeText()">Click Me</button>
    <button class="toggle" onclick="toggleMode()">Toggle Dark Mode</button>
  </main>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

  <script>
    function changeText() {
      const msg = document.getElementById("message");
      msg.textContent = "You clicked the button! 🎉";
    }

    function toggleMode() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
